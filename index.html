<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Color Scheme Generator</title>
</head>
<body>
    <nav>
        <img class="logo-img" src="images/logo.png" alt="">
        <h1 class="logo-text">Color Scheme Generator</h1>
    </nav>
    <main>
        <div class="instructions">
            <div class="instruction">
               <div class="number-container"><h3 class="ins-number first">1</h3></div> 
                <h4 class="ins-text">Pick a color</h4>
            </div>
            <div class="instruction ">
                <div class="number-container"><h3 class="ins-number second">2</h3></div>
                <h4 class="ins-text">Choose a scheme style</h4>
            </div>
            <div class="instruction ">
                <div class="number-container"><h3 class="ins-number third">3</h3></div>
                <h4 class="ins-text">Get a beautiful matching palette</h4>
            </div>
        </div>
        <div class="scheme-header">
            <input type="color" value="#f55a5a">
            <select id="color-scheme">
                <option value="test">this is test value</option>
            </select>
            <button class="btn" id="get-color-scheme">Get Color Scheme</button>
        </div>
        
    </main>

    <script src="index.js"></script>
</body>
</html>
