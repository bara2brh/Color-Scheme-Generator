<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Color Scheme Generator</title>
</head>

<body>
    <nav>
        <img class="logo-img" src="images/logo.png" alt="">
        <h1 class="logo-text">Color Scheme Generator</h1>
    </nav>
    <main>
        <div class="instructions">
            <div class="instruction">
                <div class="number-container">
                    <h3 class="ins-number first">1</h3>
                </div>
                <h4 class="ins-text">Pick a color</h4>
            </div>
            <div class="instruction ">
                <div class="number-container">
                    <h3 class="ins-number second">2</h3>
                </div>
                <h4 class="ins-text">Choose a scheme style</h4>
            </div>
            <div class="instruction ">
                <div class="number-container">
                    <h3 class="ins-number third">3</h3>
                </div>
                <h4 class="ins-text">Get a beautiful matching palette</h4>
            </div>
        </div>
        <div class="scheme-header">
            <input id="color" type="color" value="#f55a5a">
            <select id="scheme-select">
                <option value="monochrome">Monochrome</option>
                <option value="monochrome-dark">Monochrome-dark</option>
                <option value="monochrome-light">Monochrome-light</option>
                <option value="analogic">Analogic</option>
                <option value="complement">Complement</option>
                <option value="analogic-complement">Analogic-complement</option>
                <option value="triad">Triad</option>
                <option value="quad">Quad</option>

            </select>
            <button class="btn" id="get-color-scheme">Get Color Scheme</button>
        </div>
        <div id="scheme-colors" class="scheme-colors">
            <div class="color" style="background-color: #c01010;"></div>
            <div class="color" style="background-color: #ed1515;"></div>
            <div class="color" style="background-color: #f55a5a;"></div>
            <div class="color" style="background-color: #f67373;"></div>
            <div class="color" style="background-color: #f9a2a2;"></div>
        </div>
        <div id="scheme-footer" class="scheme-footer">
            <h3>#c01010</h3>
            <h3>#ed1515</h3>
            <h3>#f55a5a</h3>
            <h3>#f67373</h3>
            <h3>#f9a2a2</h3>

        </div>

    </main>
    <footer>
        Made With Love 💙<br>Bara' Hashlamoon
    </footer>

    <script src="index.js"></script>
</body>

</html>
